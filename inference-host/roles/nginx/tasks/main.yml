- name: Install nginx
  ansible.builtin.dnf:
    name:
      - nginx
    state: latest
  become: true
  become_user: root
- name: SELinux (1/3)
  ansible.builtin.shell: "semanage port -a -t http_port_t -p tcp 5500"
  become: true
  become_user: root
- name: SELinux (2/3)
  ansible.builtin.shell: "semanage port -a -t http_port_t -p tcp 5555"
  become: true
  become_user: root
- name: SELinux (3/3)
  ansible.builtin.shell: "setsebool -P httpd_can_network_connect 1"
  become: true
  become_user: root
- name: Put in place proxy config
  ansible.builtin.copy:
    dest: /etc/nginx/default.d/llm_proxy.conf
    src: files/llm_proxy.conf
  become: true
  become_user: root
- name: Enable and start nginx service
  ansible.builtin.systemd_service:
    name: nginx
    enabled: true
    state: restarted
  become: true
  become_user: root
   
