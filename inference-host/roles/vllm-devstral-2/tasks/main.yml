- name: Make sure that the cache directory is present
  ansible.builtin.file:
    path: /home/almalinux/cache
    state: directory
- name: Create + start VLLM container with Devstral 2 
  ansible.builtin.shell: 'docker run -d --restart=always --device nvidia.com/gpu=all -v /home/almalinux/cache:/root/.cache -p 127.0.0.1:5500:5500 --ipc=host --name=inference docker.io/vllm/vllm-openai:latest --port 5500 --model mistralai/Devstral-Small-2-24B-Instruct-2512 --served-model-name Devstral-Small-2 --enable-auto-tool-choice --tool-call-parser mistral'
