- name: Put in place auth file
  ansible.builtin.copy:
    dest: /etc/nginx/nginx.auth
    src: files/nginx.auth
    mode: "0640"
    group: nginx
  become: true
  become_user: root
- name: Enable and start nginx service
  ansible.builtin.systemd_service:
    name: nginx
    enabled: true
    state: restarted
  become: true
  become_user: root
   
