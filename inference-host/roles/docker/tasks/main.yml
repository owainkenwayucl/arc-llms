- name: Docker repo
  ansible.builtin.yum_repository:
    baseurl: "https://download.docker.com/linux/centos/9/x86_64/stable"
    state: present
    gpgkey: "https://download.docker.com/linux/centos/gpg"
    gpgcheck: true
    name: "Docker_CE_Stable_-_x86_64"
    description: "Docker CE Stable - x86_64"
  become: true
  become_user: root
- name: Install iptables-nft
  ansible.builtin.dnf:
    name:
      - iptables-nft
    state: latest
  become: true
  become_user: root
- name: Install Docker
  ansible.builtin.dnf:
    name:
      - docker-ce 
      - docker-ce-cli 
      - containerd.io 
      - docker-buildx-plugin
      - docker-compose-plugin
    state: latest
  become: true
  become_user: root
- name: Enable Docker Service
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  become: true
  become_user: root
- name: Add almalinux to the docker group
  ansible.builtin.user:
    append: true
    groups: docker
    name: almalinux
  become: true
  become_user: root
